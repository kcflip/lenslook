<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lenslook Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      margin: 0;
      padding: 2rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    p.sub { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .charts {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .chart-wrap {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 1.5rem;
    }
    .chart-wrap.bar { flex: 1; min-width: 500px; }
    .chart-wrap.pie { width: 280px; }
    .chart-wrap h2 { font-size: 0.85rem; color: #888; margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <h1>Lenslook — Lens Mentions</h1>
  <p class="sub">From <code>output/test.json</code></p>
  <div class="charts">
    <div class="chart-wrap bar">
      <h2>Lens Mentions</h2>
      <canvas id="barChart"></canvas>
    </div>
    <div class="chart-wrap pie">
      <h2>Matches by Subreddit</h2>
      <canvas id="pieChart"></canvas>
    </div>
  </div>

  <script>
    fetch('output/test.json')
      .then(r => r.json())
      .then(data => {
        const counts = data.lensCounts;
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const labels = sorted.map(([id]) => id);
        const values = sorted.map(([, count]) => count);

        const subredditCounts = {};
        for (const post of data.posts) {
          const sub = post.subreddit;
          subredditCounts[sub] = (subredditCounts[sub] ?? 0) + 1;
        }
        new Chart(document.getElementById('pieChart'), {
          type: 'pie',
          data: {
            labels: Object.keys(subredditCounts),
            datasets: [{
              data: Object.values(subredditCounts),
              backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#ef4444'],
              borderWidth: 0,
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'bottom', labels: { color: '#ccc', font: { size: 11 } } },
            }
          }
        });

        new Chart(document.getElementById('barChart'), {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Mentions',
              data: values,
              backgroundColor: '#3b82f6',
              borderRadius: 4,
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            plugins: {
              legend: { display: false },
            },
            scales: {
              x: {
                ticks: { color: '#aaa', stepSize: 1 },
                grid: { color: '#2a2a2a' },
              },
              y: {
                ticks: { color: '#ccc', font: { size: 11 } },
                grid: { color: '#2a2a2a' },
              }
            }
          }
        });
      });
  </script>
</body>
</html>
